name: petmach

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: petmach
      POSTGRES_USER: petmach
      POSTGRES_PASSWORD: ${PETMACH_POSTGRES_PASSWORD:?Defina PETMACH_POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - petmach-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petmach -d petmach"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: backend/src/PetMach.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__petmach: Host=postgres;Port=5432;Database=petmach;Username=petmach;Password=${PETMACH_POSTGRES_PASSWORD}
      Identity__SigningKey: ${Identity__SigningKey:?Defina Identity__SigningKey}
    ports:
      - "5080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    depends_on:
      migrator:
        condition: service_completed_successfully

  migrator:
    build:
      context: .
      dockerfile: backend/src/PetMach.Api/Dockerfile
      target: migrator
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__petmach: Host=postgres;Port=5432;Database=petmach;Username=petmach;Password=${PETMACH_POSTGRES_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  admin:
    build:
      context: .
      dockerfile: backend/src/PetMach.Admin/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      PetMachApi__BaseUrl: http://api:8080/
    ports:
      - "5081:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health/ready"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      api:
        condition: service_healthy

volumes:
  petmach-postgres:
